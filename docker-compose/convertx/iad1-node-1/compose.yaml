---
name: convertx


networks:
  frontend:
    external: true

volumes:
  data:

services:
  convertx:
    image: ghcr.io/c4illin/convertx:v0.17.0
    user: "${CONVERTX_SRV_ID:-2025}:${CONVERTX_GROUP_ID:-2025}"
    container_name: convertx
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on:
      chown:
        condition: service_completed_successfully
    environment:
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - data:/app/data
    networks:
      - frontend
    labels:
      traefik.enable: true
      traefik.external: true
      traefik.http.routers.convertx-prod-1-http.entrypoints: web
      traefik.http.routers.convertx-prod-1-http.rule: Host(`convert.jakerob.pro`)
      traefik.http.routers.convertx-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.convertx-prod-1-https.entrypoints: websecure
      traefik.http.routers.convertx-prod-1-https.rule: Host(`convert.jakerob.pro`)
      traefik.http.routers.convertx-prod-1-https.tls: true
      traefik.http.routers.convertx-prod-1-https.tls.certresolver: production

  # This image will mount the volume and then simply execute chown on the parent folder for the UID/GID specified.
  chown:
    image: alpine
    command:
      - |
        chown -R ${CONVERTX_SRV_ID:-2025}:${CONVERTX_GROUP_ID:-2025} /app/data
    networks: []
    volumes:
      - data:/app/data
    entrypoint: [/bin/ash, "-c"]
