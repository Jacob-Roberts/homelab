---
name: media-management

networks:
  frontend:
    external: true
  internal:
    external: false

volumes:
  calibre_calibre-ingest:
    external: true

services:
  gluetun:
    image: docker.io/qmcgaw/gluetun:v3
    container_name: gluetun
    hostname: gluetun
    security_opt:
      - no-new-privileges:true
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    ports:
      - 8888:8888/tcp   # Gluetun Local Network HTTP proxy
      - 8388:8388/tcp   # Gluetun Local Network Shadowsocks
      - 8388:8388/udp   # Gluetun Local Network Shadowsocks
      - 8000:8000       # Gluetun control server
      - 6881:6881/tcp   # qBittorrent Torrent Port TCP
      - 6881:6881/udp   # qBittorrent Torrent Port UDP
    environment:
      - "TZ=${TZ:-UTC}"
      - VPN_SERVICE_PROVIDER=protonvpn
      - VPN_TYPE=wireguard
      - "WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}"
      - FIREWALL_OUTBOUND_SUBNETS=192.168.0.0/16 # Internal network
      # Free VPN
      # - FREE_ONLY=on
      # Paid VPN
      - FREE_ONLY=off
      - VPN_PORT_FORWARDING=on
      - VPN_PORT_FORWARDING_PROVIDER=protonvpn
      - SERVER_COUNTRIES=United States
      - SERVER_CITIES=San Jose
      - PORT_FORWARD_ONLY=on
      - VPN_PORT_FORWARDING_UP_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":{{PORT}},\"current_network_interface\":\"{{VPN_INTERFACE}}\",\"random_port\":false,\"upnp\":false}" http://127.0.0.1:8080/api/v2/app/setPreferences'
      - VPN_PORT_FORWARDING_DOWN_COMMAND=/bin/sh -c 'wget -O- -nv --retry-connrefused --post-data "json={\"listen_port\":0,\"current_network_interface\":\"lo\"}" http://127.0.0.1:8080/api/v2/app/setPreferences'
    networks:
      - internal
      - frontend
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - ./gluetun-config:/gluetun
      - ./gluetun-config/info:/tmp/gluetun

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    labels:
      traefik.enable: true
      traefik.docker.network: frontend
      traefik.http.services.qbittorrent-prod-1.loadBalancer.server.port: 8080
      traefik.http.routers.qbittorrent-prod-1-http.service: qbittorrent-prod-1
      traefik.http.routers.qbittorrent-prod-1-https.service: qbittorrent-prod-1
      traefik.http.routers.qbittorrent-prod-1-http.entrypoints: web
      traefik.http.routers.qbittorrent-prod-1-http.rule: Host(`${QBITTORRENT_URL:-qbittorrent.pbj.jakerob.pro}`)
      traefik.http.routers.qbittorrent-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.qbittorrent-prod-1-https.entrypoints: websecure
      traefik.http.routers.qbittorrent-prod-1-https.rule: Host(`${QBITTORRENT_URL:-qbittorrent.pbj.jakerob.pro}`)
      traefik.http.routers.qbittorrent-prod-1-https.tls: true
      traefik.http.routers.qbittorrent-prod-1-https.tls.certresolver: cloudflare
      traefik.http.services.prowlarr-prod-1.loadBalancer.server.port: 9696
      traefik.http.routers.prowlarr-prod-1-http.service: prowlarr-prod-1
      traefik.http.routers.prowlarr-prod-1-https.service: prowlarr-prod-1
      traefik.http.routers.prowlarr-prod-1-http.entrypoints: web
      traefik.http.routers.prowlarr-prod-1-http.rule: Host(`${PROWLARR_URL:-prowlarr.pbj.jakerob.pro}`)
      traefik.http.routers.prowlarr-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.prowlarr-prod-1-https.entrypoints: websecure
      traefik.http.routers.prowlarr-prod-1-https.rule: Host(`${PROWLARR_URL:-prowlarr.pbj.jakerob.pro}`)
      traefik.http.routers.prowlarr-prod-1-https.tls: true
      traefik.http.routers.prowlarr-prod-1-https.tls.certresolver: cloudflare
      traefik.http.services.radarr-prod-1.loadBalancer.server.port: 7878
      traefik.http.routers.radarr-prod-1-http.service: radarr-prod-1
      traefik.http.routers.radarr-prod-1-https.service: radarr-prod-1
      traefik.http.routers.radarr-prod-1-http.entrypoints: web
      traefik.http.routers.radarr-prod-1-http.rule: Host(`${RADARR_URL:-radarr.pbj.jakerob.pro}`)
      traefik.http.routers.radarr-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.radarr-prod-1-https.entrypoints: websecure
      traefik.http.routers.radarr-prod-1-https.rule: Host(`${RADARR_URL:-radarr.pbj.jakerob.pro}`)
      traefik.http.routers.radarr-prod-1-https.tls: true
      traefik.http.routers.radarr-prod-1-https.tls.certresolver: cloudflare
      traefik.http.services.sonarr-prod-1.loadBalancer.server.port: 8989
      traefik.http.routers.sonarr-prod-1-http.service: sonarr-prod-1
      traefik.http.routers.sonarr-prod-1-https.service: sonarr-prod-1
      traefik.http.routers.sonarr-prod-1-http.entrypoints: web
      traefik.http.routers.sonarr-prod-1-http.rule: Host(`${SONARR_URL:-sonarr.pbj.jakerob.pro}`)
      traefik.http.routers.sonarr-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.sonarr-prod-1-https.entrypoints: websecure
      traefik.http.routers.sonarr-prod-1-https.rule: Host(`${SONARR_URL:-sonarr.pbj.jakerob.pro}`)
      traefik.http.routers.sonarr-prod-1-https.tls: true
      traefik.http.routers.sonarr-prod-1-https.tls.certresolver: cloudflare
      traefik.http.services.bazarr-prod-1.loadBalancer.server.port: 6767
      traefik.http.routers.bazarr-prod-1-http.service: bazarr-prod-1
      traefik.http.routers.bazarr-prod-1-https.service: bazarr-prod-1
      traefik.http.routers.bazarr-prod-1-http.entrypoints: web
      traefik.http.routers.bazarr-prod-1-http.rule: Host(`${BAZARR_URL:-bazarr.pbj.jakerob.pro}`)
      traefik.http.routers.bazarr-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.bazarr-prod-1-https.entrypoints: websecure
      traefik.http.routers.bazarr-prod-1-https.rule: Host(`${BAZARR_URL:-bazarr.pbj.jakerob.pro}`)
      traefik.http.routers.bazarr-prod-1-https.tls: true
      traefik.http.routers.bazarr-prod-1-https.tls.certresolver: cloudflare
      traefik.http.services.shelfmark-prod-1.loadBalancer.server.port: 8084
      traefik.http.routers.shelfmark-prod-1-http.service: shelfmark-prod-1
      traefik.http.routers.shelfmark-prod-1-https.service: shelfmark-prod-1
      traefik.http.routers.shelfmark-prod-1-http.entrypoints: web
      traefik.http.routers.shelfmark-prod-1-http.rule: Host(`${SHELFMARK_URL:-shelfmark.pbj.jakerob.pro}`)
      traefik.http.routers.shelfmark-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.shelfmark-prod-1-https.entrypoints: websecure
      traefik.http.routers.shelfmark-prod-1-https.rule: Host(`${SHELFMARK_URL:-shelfmark.pbj.jakerob.pro}`)
      traefik.http.routers.shelfmark-prod-1-https.tls: true
      traefik.http.routers.shelfmark-prod-1-https.tls.certresolver: cloudflare

  qbittorrent:
    image: docker.io/11notes/qbittorrent:5
    container_name: qbittorrent
    # prevents write access to the image itself
    read_only: true
    user: "${DOCKER_USER_ID:-2022}:${DOCKER_GROUP_ID:-2022}"
    group_add:
      - "${DOCKER_GROUP_ID_JELLYFIN:-2003}"
    # prevents any process within the container to gain more privileges
    security_opt:
      - no-new-privileges=true
    depends_on:
      - gluetun
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - ./qbittorrent-config/etc:/qbittorrent/etc
      - ./qbittorrent-config/var:/qbittorrent/var
      - /media/jellydata/torrents:/jellydata/torrents:rw
    ## Do Not Change Network for qBittorrent
    ## qBittorrent MUST always use a VPN / Secure Internet connection
    network_mode: service:gluetun

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  radarr:
    image: docker.io/11notes/radarr:6
    container_name: radarr
    # prevents write access to the image itself
    read_only: true
    user: "${DOCKER_USER_ID:-2022}:${DOCKER_GROUP_ID:-2022}"
    group_add:
      - "${DOCKER_GROUP_ID_JELLYFIN:-2003}"
    # prevents any process within the container to gain more privileges
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./radarr-config:/radarr/etc/
      - /media/jellydata:/jellydata
    tmpfs:
      # required for read-only image
      - "/tmp:uid=${DOCKER_USER_ID:-2022},gid=${DOCKER_GROUP_ID:-2022}"
    logging:
      driver: json-file
    network_mode: service:gluetun

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  sonarr:
    image: docker.io/11notes/sonarr:4
    container_name: sonarr
    # prevents write access to the image itself
    read_only: true
    user: "${DOCKER_USER_ID:-2022}:${DOCKER_GROUP_ID:-2022}"
    group_add:
      - "${DOCKER_GROUP_ID_JELLYFIN:-2003}"
    # prevents any process within the container to gain more privileges
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./sonarr-config:/sonarr/etc/
      - /media/jellydata:/jellydata
    tmpfs:
      # required for read-only image
      - "/tmp:uid=${DOCKER_USER_ID:-2022},gid=${DOCKER_GROUP_ID:-2022}"
    logging:
      driver: json-file
    network_mode: service:gluetun

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  bazarr:
    image: lscr.io/linuxserver/bazarr:1.5.4
    container_name: bazarr
    user: "${DOCKER_USER_ID:-2022}:${DOCKER_GROUP_ID:-2022}"
    group_add:
      - "${DOCKER_GROUP_ID_JELLYFIN:-2003}"
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./subcleaner:/opt/subcleaner/
      - ./bazarr-config:/config
      - /media/jellydata/media:/jellydata/media
    tmpfs:
      - "/run:uid=${DOCKER_USER_ID:-2022},gid=${DOCKER_GROUP_ID:-2022},exec"
    logging:
      driver: json-file
    network_mode: service:gluetun

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  prowlarr:
    image: docker.io/11notes/prowlarr:2
    container_name: prowlarr
    # prevents write access to the image itself
    read_only: true
    user: "${DOCKER_USER_ID:-2022}:${DOCKER_GROUP_ID:-2022}"
    group_add:
      - "${DOCKER_GROUP_ID_JELLYFIN:-2003}"
    # prevents any process within the container to gain more privileges
    security_opt:
      - no-new-privileges=true
    restart: unless-stopped
    environment:
      TZ: "${TZ:-UTC}"
    volumes:
      - ./prowlarr-config:/prowlarr/etc/
    tmpfs:
      # required for read-only image
      - "/tmp:uid=${DOCKER_USER_ID:-2022},gid=${DOCKER_GROUP_ID:-2022}"
    network_mode: service:gluetun

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0
    container_name: flaresolverr
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_HTML: "${LOG_HTML:-false}"
      CAPTCHA_SOLVER: "${CAPTCHA_SOLVER:-none}"
      TZ: ${TZ:-UTC}
    network_mode: service:gluetun # http://gluetun:8191/

    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G

  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - 8266:8266 # server port
    environment:
      TZ: ${TZ:-UTC}
      PUID: "${PUID:-2003}"
      PGID: "${PGID:-2003}"
      UMASK_SET: '002'
      serverIP: 0.0.0.0
      serverPort: '8266'
      webUIPort: '8265'
      internalNode: "true"
      inContainer: "true"
      ffmpegVersion: '7'
      nodeName: pbj-node-1
      auth: "false"
      openBrowser: "true"
      maxLogSizeMB: '10'
      cronPluginUpdate: ""
      NVIDIA_DRIVER_CAPABILITIES: all
      NVIDIA_VISIBLE_DEVICES: all
    networks:
      - frontend
    # devices:
    #   - /dev/dri:/dev/dri
    volumes:
      - ./tdarr-config/server:/app/server
      - ./tdarr-config/configs:/app/configs
      - ./tdarr-config/logs:/app/logs
      - /media/jellydata/media:/media:rw
      - /media/jellydata/transcode_cache:/tcache

    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
    labels:
      traefik.enable: true
      traefik.docker.network: frontend
      traefik.http.services.tdarr-prod-1.loadBalancer.server.port: 8265
      traefik.http.routers.tdarr-prod-1-http.entrypoints: web
      traefik.http.routers.tdarr-prod-1-http.rule: Host(`${TDARR_URL:-tdarr.pbj.jakerob.pro}`)
      traefik.http.routers.tdarr-prod-1-http.middlewares: "websecure-redirect-permanent@file"
      traefik.http.routers.tdarr-prod-1-https.entrypoints: websecure
      traefik.http.routers.tdarr-prod-1-https.rule: Host(`${TDARR_URL:-tdarr.pbj.jakerob.pro}`)
      traefik.http.routers.tdarr-prod-1-https.tls: true
      traefik.http.routers.tdarr-prod-1-https.tls.certresolver: cloudflare

  shelfmark:
    image: ghcr.io/calibrain/shelfmark-lite:latest
    container_name: shelfmark
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    environment:
      PUID: ${CALIBRE_USER_ID:-2006}
      PGUID: ${CALIBRE_GROUP_ID:-2006}
      SEARCH_MODE: universal
      USING_EXTERNAL_BYPASSER: true
      EXT_BYPASSER_URL: http://gluetun:8191
      CALIBRE_WEB_URL: https://calibre.jakerob.pro
      HARDCOVER_ENABLED: true
      HARDCOVER_API_KEY: ${HARDCOVER_API_KEY}
    volumes:
      - calibre_calibre-ingest:/books # Default destination for book downloads
      - ./shelfmark/config:/config # App configuration
      # Required for torrent / usenet - path must match your download client's volume exactly
      # - /path/to/downloads:/path/to/downloads
    network_mode: service:gluetun # http://gluetun:8084/

    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M

  # debug2:
  #   image: docker.io/jonlabelle/network-tools
  #   container_name: debug2
  #   stdin_open: true
  #   tty: true

  # debug:
  #   image: docker.io/jonlabelle/network-tools
  #   container_name: debug
  #   stdin_open: true
  #   tty: true
  #   network_mode: "service:gluetun"
