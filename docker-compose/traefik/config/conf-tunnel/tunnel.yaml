# This tunnel only uses http
http:
  services:
    pbj-traefik:
      loadBalancer:
        servers:
          - url: https://traefik

  routers:
    # WHOAMI PBJ
    whoami-pbj-https:
      entrypoints: websecure
      rule: "Host(`whoami-tunnel.pbj.jakerob.pro`)"
      service: pbj-traefik
      tls: true

    auth-https:
      entrypoints: websecure
      rule: "Host(`auth.jakerob.pro`)"
      service: pbj-traefik
      tls: true

    # IMMICH
    immich-pbj-https:
      entrypoints: websecure
      rule: "Host(`photos.jakerob.pro`)"
      service: pbj-traefik
      tls: true

    # Jellyfin
    jellyfin-pbj-https:
      entrypoints: websecure
      rule: "Host(`jellyfin.jakerob.pro`)"
      service: pbj-traefik
      tls: true

    # Karakeep
    karakeep-pbj-https:
      entrypoints: websecure
      rule: "Host(`karakeep.jakerob.pro`)"
      service: pbj-traefik
      tls: true

    # Calibre
    calibre-pbj-https:
      entrypoints: websecure
      rule: "Host(`calibre.jakerob.pro`)"
      service: pbj-traefik
      tls: true